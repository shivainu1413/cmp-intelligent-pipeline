# ============================================================
# K8s Secrets Template
# ============================================================
# IMPORTANT: This file contains PLACEHOLDER values only.
# Before applying, replace all <PLACEHOLDER> values with your
# actual base64-encoded secrets.
#
# To encode a value:
#   echo -n "your-secret-value" | base64
#
# NEVER commit real secrets to Git.
# Use this as a template or manage secrets via:
#   - kubectl create secret (imperative)
#   - External Secrets Operator + Vault/AWS SM
#   - Sealed Secrets
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: etl-pipeline-secrets
  namespace: airflow
type: Opaque
data:
  # echo -n "your-mongo-uri" | base64
  MONGO_URI: <BASE64_ENCODED_MONGO_URI>
  # echo -n "your-gemini-key" | base64
  GEMINI_API_KEY: <BASE64_ENCODED_GEMINI_API_KEY>
  # echo -n "https://hooks.slack.com/..." | base64
  SLACK_ANOMALY_WEBHOOK: <BASE64_ENCODED_SLACK_ANOMALY_WEBHOOK>
  # echo -n "https://hooks.slack.com/..." | base64
  SLACK_MISMATCH_WEBHOOK: <BASE64_ENCODED_SLACK_MISMATCH_WEBHOOK>
  # echo -n "postgresql+psycopg2://airflow:airflow@postgres-svc.data.svc.cluster.local/airflow" | base64
  POSTGRES_CONN_STR: <BASE64_ENCODED_POSTGRES_CONN_STR>
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: data
type: Opaque
data:
  # echo -n "airflow" | base64 → YWlyZmxvdw==
  POSTGRES_USER: YWlyZmxvdw==
  # echo -n "airflow" | base64 → YWlyZmxvdw==
  POSTGRES_PASSWORD: YWlyZmxvdw==
  # echo -n "airflow" | base64 → YWlyZmxvdw==
  POSTGRES_DB: YWlyZmxvdw==
