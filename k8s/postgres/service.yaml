# ============================================================
# PostgreSQL Service
# ClusterIP (internal only) — only Airflow and Superset
# need to reach the database, not the outside world.
#
# Other Pods connect via:
#   postgres-svc.data.svc.cluster.local:5432
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: data
  labels:
    app: postgres
    app.kubernetes.io/part-of: cmp-pipeline
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgres
