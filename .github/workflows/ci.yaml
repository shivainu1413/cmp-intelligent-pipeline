name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------
  # Stage 1: Lint — Code quality check
  # --------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check dags/ plugins/ tests/

  # --------------------------------------------------------
  # Stage 2: Test — Unit tests with coverage
  # --------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/ -v --cov=plugins --cov-report=term-missing

  # --------------------------------------------------------
  # Stage 3: Build — Docker images → GHCR
  # --------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Airflow Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/airflow:${{ github.sha }}
            ghcr.io/${{ github.repository }}/airflow:latest

      - name: Build Superset Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.superset
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/superset:${{ github.sha }}
            ghcr.io/${{ github.repository }}/superset:latest

  # --------------------------------------------------------
  # Stage 4: Deploy — Pull new images and restart services
  #
  # Only runs on main branch after build succeeds.
  # Requires these GitHub Secrets:
  #   DEPLOY_HOST     — server IP or hostname
  #   DEPLOY_USER     — SSH username
  #   DEPLOY_SSH_KEY  — private SSH key
  #   DEPLOY_PATH     — project path on server (e.g. /opt/cmp-pipeline)
  #
  # To skip deployment (e.g. while no server is set up),
  # simply don't create these secrets. The job will be
  # skipped gracefully.
  # --------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Check deployment config
        id: check
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DEPLOY_HOST not set, skipping deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            echo "✅ Deployed commit ${{ github.sha }}"

      - name: Deployment skipped
        if: steps.check.outputs.skip == 'true'
        run: echo "ℹ️ No deployment target configured. Set DEPLOY_HOST secret to enable CD."
